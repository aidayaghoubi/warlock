# nginx site config for Warlock on a single VPS.
# Serves the built static client (dist/) and reverse-proxies WebSocket traffic
# to the Node game server on :8787.
#
# Install:  sudo cp deploy/nginx.conf /etc/nginx/sites-available/warlock
#           sudo ln -s /etc/nginx/sites-available/warlock /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
# IP-ONLY (no domain yet): leave this as plain HTTP. The client auto-detects
# `ws://` from the page protocol, and proxies /ws/ to the game server below.
# WHEN YOU GET A DOMAIN: run `sudo certbot --nginx -d yourdomain.com` and it
# will rewrite this to HTTPS; the client will then auto-use `wss://`.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;            # match any host / the bare IP

    # --- Static client ---
    root /opt/warlock/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- WebSocket game server ---
    # NOTE: this requires the client to connect to `/ws` instead of `:8787`.
    # Set VITE_SERVER_URL accordingly at build time (see deploy/README.md).
    location /ws {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # keep long-lived game sockets open
        proxy_send_timeout 3600s;
    }
}
